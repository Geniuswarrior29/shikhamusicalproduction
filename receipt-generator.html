<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Receipt Generator — Shikha Musical Production</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --gold: #D4AF37;
    --magenta: #E91E8C;
    --dark: #0A0A0A;
    --card: #161616;
    --text: #F0EEE8;
    --muted: #888;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 16px;
  }
  .container { max-width: 720px; margin: 0 auto; }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: var(--gold);
    margin-bottom: 4px;
  }
  .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 32px; }

  /* FORM */
  .input-card {
    background: #111;
    border: 1px solid rgba(212,175,55,0.2);
    border-radius: 10px;
    padding: 28px;
    margin-bottom: 24px;
  }
  .input-card h2 {
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 20px;
    font-weight: 600;
  }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .full { grid-column: 1 / -1; }
  .fg { display: flex; flex-direction: column; gap: 6px; }
  .fg label { font-size: 0.74rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gold); }
  .fg input, .fg select, .fg textarea {
    background: #0A0A0A;
    border: 1px solid rgba(212,175,55,0.18);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .fg input:focus, .fg select:focus { border-color: var(--gold); }
  .fg select option { background: #111; }

  .gen-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--gold), #B8941F);
    color: #0A0A0A;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    margin-bottom: 28px;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(212,175,55,0.25);
  }
  .gen-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(212,175,55,0.4); }

  /* PREVIEW */
  #previewArea { display: none; }
  .receipt-actions {
    display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .action-btn {
    padding: 11px 24px;
    border-radius: 6px;
    border: none;
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .action-btn:hover { transform: translateY(-1px); }
  .btn-pdf { background: var(--gold); color: #0A0A0A; }
  .btn-print { background: rgba(212,175,55,0.12); color: var(--gold); border: 1px solid rgba(212,175,55,0.3); }

  /* RECEIPT CANVAS */
  #receiptCanvas {
    background: #fff;
    color: #111;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 8px 48px rgba(0,0,0,0.6);
    font-family: 'Inter', sans-serif;
  }
  .rc-header {
    background: #0A0A0A;
    color: #D4AF37;
    text-align: center;
    padding: 30px 24px 20px;
    position: relative;
  }
  .rc-header::after {
    content: '';
    display: block;
    height: 3px;
    background: linear-gradient(90deg, #D4AF37, #E91E8C, #D4AF37);
    margin-top: 18px;
    margin-left: -24px;
    margin-right: -24px;
  }
  .rc-logo-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 900;
    letter-spacing: 0.02em;
    margin-bottom: 3px;
  }
  .rc-tagline { font-size: 0.75rem; color: #aaa; letter-spacing: 0.15em; text-transform: uppercase; }
  .rc-title {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #E91E8C;
    margin-top: 14px;
  }
  .rc-body { padding: 28px 28px 20px; }
  .receipt-no-row {
    display: flex; justify-content: space-between; align-items: center;
    background: #F8F5EC;
    border-radius: 6px;
    padding: 10px 16px;
    margin-bottom: 22px;
    font-size: 0.8rem;
    color: #555;
    font-weight: 500;
  }
  .receipt-no-row .rno { font-size: 1rem; color: #0A0A0A; font-weight: 700; }

  .rc-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
  .rc-table td {
    padding: 9px 12px;
    font-size: 0.85rem;
    vertical-align: top;
    border-bottom: 1px solid #eee;
  }
  .rc-table td:first-child {
    width: 42%;
    color: #777;
    font-weight: 500;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }
  .rc-table td:last-child { color: #111; font-weight: 600; }
  .rc-table tr:last-child td { border-bottom: none; }

  .fee-row {
    background: #0A0A0A;
    border-radius: 8px;
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 20px;
    margin-bottom: 20px;
  }
  .fee-row .fee-label { color: #aaa; font-size: 0.8rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; }
  .fee-row .fee-amount { color: #D4AF37; font-size: 1.5rem; font-weight: 700; font-family: 'Playfair Display', serif; }

  .paid-stamp {
    display: inline-block;
    border: 3px solid #22C55E;
    color: #22C55E;
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: 0.15em;
    padding: 4px 18px;
    border-radius: 4px;
    transform: rotate(-5deg);
    margin-left: 10px;
  }

  .rc-utr {
    background: #F8F5EC;
    border-left: 3px solid #D4AF37;
    padding: 10px 14px;
    font-size: 0.82rem;
    color: #555;
    border-radius: 0 6px 6px 0;
    margin-bottom: 20px;
  }
  .rc-utr strong { color: #111; }

  .rc-footer {
    border-top: 1px solid #e5e5e5;
    padding: 18px 28px;
    text-align: center;
    background: #FAFAFA;
  }
  .rc-footer p { font-size: 0.75rem; color: #888; line-height: 1.6; }
  .rc-footer strong { color: #D4AF37; }

  .watermark {
    text-align: center;
    font-size: 0.65rem;
    color: #ccc;
    padding: 8px;
    background: #fff;
    letter-spacing: 0.1em;
  }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    .full { grid-column: 1; }
    .receipt-actions { flex-direction: column; }
    .action-btn { width: 100%; }
  }
  @media print {
    body { background: white; padding: 0; }
    .container > *:not(#previewArea) { display: none !important; }
    #previewArea { display: block !important; }
    .receipt-actions { display: none !important; }
    #receiptCanvas { box-shadow: none; }
  }
</style>
</head>
<body>
<div class="container">

  <h1>🎟️ Receipt Generator</h1>
  <p class="subtitle">Shikha Musical Production — Mega Contest 2025 &nbsp;|&nbsp; Admin Panel</p>

  <div class="input-card">
    <h2>Participant Details</h2>
    <div class="grid">
      <div class="fg">
        <label>Full Name *</label>
        <input type="text" id="r_name" placeholder="e.g. Anjali Sharma"/>
      </div>
      <div class="fg">
        <label>Father's / Guardian's Name *</label>
        <input type="text" id="r_guardian" placeholder="e.g. Ramesh Sharma"/>
      </div>
      <div class="fg">
        <label>Date of Birth</label>
        <input type="date" id="r_dob"/>
      </div>
      <div class="fg">
        <label>Gender</label>
        <select id="r_gender">
          <option value="">— Select —</option>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>
      </div>
      <div class="fg">
        <label>Mobile Number</label>
        <input type="tel" id="r_mobile" placeholder="+91 XXXXX XXXXX"/>
      </div>
      <div class="fg">
        <label>WhatsApp Number</label>
        <input type="tel" id="r_whatsapp" placeholder="+91 XXXXX XXXXX"/>
      </div>
      <div class="fg">
        <label>Contest Category *</label>
        <select id="r_category">
          <option value="">— Select —</option>
          <option>Singing</option>
          <option>Dancing</option>
          <option>Modeling</option>
        </select>
      </div>
      <div class="fg">
        <label>Registration / Payment Date *</label>
        <input type="date" id="r_date"/>
      </div>
      <div class="fg full">
        <label>Full Address</label>
        <input type="text" id="r_address" placeholder="House No., Street, City, State, PIN"/>
      </div>
    </div>
  </div>

  <div class="input-card">
    <h2>Payment Details</h2>
    <div class="grid">
      <div class="fg">
        <label>Amount Paid (₹)</label>
        <input type="number" id="r_amount" value="500"/>
      </div>
      <div class="fg">
        <label>UTR / Transaction ID</label>
        <input type="text" id="r_utr" placeholder="e.g. 412345678901"/>
      </div>
      <div class="fg">
        <label>Payment Method</label>
        <select id="r_paymethod">
          <option>PhonePe</option>
          <option>Google Pay</option>
          <option>Paytm</option>
          <option>UPI</option>
          <option>Cash</option>
          <option>Bank Transfer</option>
        </select>
      </div>
      <div class="fg">
        <label>Receipt Number</label>
        <input type="text" id="r_receiptno" placeholder="Auto-generated if blank"/>
      </div>
    </div>
  </div>

  <button class="gen-btn" onclick="generateReceipt()">Generate Receipt ✦</button>

  <!-- PREVIEW -->
  <div id="previewArea">
    <div class="receipt-actions">
      <button class="action-btn btn-pdf" onclick="downloadPDF()">⬇ Download PDF</button>
      <button class="action-btn btn-print" onclick="window.print()">🖨 Print Receipt</button>
    </div>

    <div id="receiptCanvas">
      <!-- filled by JS -->
    </div>
  </div>

</div>

<script>
  // Set today's date
  document.getElementById('r_date').valueAsDate = new Date();

  function pad(n){ return String(n).padStart(2,'0'); }
  function genReceiptNo(){
    const d = new Date();
    return 'SMP-' + d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate()) + '-' + Math.floor(100+Math.random()*900);
  }
  function formatDate(val){
    if(!val) return '—';
    const [y,m,d] = val.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return d + ' ' + months[parseInt(m)-1] + ' ' + y;
  }

  function generateReceipt(){
    const name = document.getElementById('r_name').value.trim();
    const guardian = document.getElementById('r_guardian').value.trim();
    if(!name){ alert('Please enter participant name.'); return; }

    const dob = document.getElementById('r_dob').value;
    const gender = document.getElementById('r_gender').value;
    const mobile = document.getElementById('r_mobile').value.trim();
    const whatsapp = document.getElementById('r_whatsapp').value.trim();
    const category = document.getElementById('r_category').value || '—';
    const date = document.getElementById('r_date').value;
    const address = document.getElementById('r_address').value.trim();
    const amount = document.getElementById('r_amount').value || '500';
    const utr = document.getElementById('r_utr').value.trim();
    const paymethod = document.getElementById('r_paymethod').value;
    const receiptno = document.getElementById('r_receiptno').value.trim() || genReceiptNo();

    const catIcon = { Singing:'🎤', Dancing:'💃', Modeling:'👑' }[category] || '✦';

    document.getElementById('receiptCanvas').innerHTML = `
      <div class="rc-header">
        <div class="rc-logo-name">🎵 Shikha Musical Production</div>
        <div class="rc-tagline">Mega Contest 2025 — Official Receipt</div>
        <div class="rc-title">Registration Payment Receipt</div>
      </div>

      <div class="rc-body">
        <div class="receipt-no-row">
          <span>Receipt No. <span class="rno">${receiptno}</span></span>
          <span>Date: <strong style="color:#111">${formatDate(date)}</strong></span>
        </div>

        <table class="rc-table">
          <tr><td>Participant Name</td><td>${name}</td></tr>
          <tr><td>Father / Guardian</td><td>${guardian || '—'}</td></tr>
          <tr><td>Date of Birth</td><td>${formatDate(dob)}</td></tr>
          <tr><td>Gender</td><td>${gender || '—'}</td></tr>
          <tr><td>Mobile</td><td>${mobile || '—'}</td></tr>
          <tr><td>WhatsApp</td><td>${whatsapp || '—'}</td></tr>
          <tr><td>Address</td><td>${address || '—'}</td></tr>
          <tr><td>Contest Category</td><td>${catIcon} ${category}</td></tr>
        </table>

        <div class="fee-row">
          <div>
            <div class="fee-label">Registration Fee Paid</div>
            <div class="fee-amount">₹ ${parseFloat(amount).toFixed(2)}</div>
          </div>
          <div>
            <div style="font-size:0.75rem;color:#888;text-align:right;margin-bottom:4px;">via ${paymethod}</div>
            <span class="paid-stamp">PAID</span>
          </div>
        </div>

        ${utr ? `<div class="rc-utr">Transaction / UTR ID: <strong>${utr}</strong></div>` : ''}

        <p style="font-size:0.78rem;color:#888;text-align:center;line-height:1.6;">
          This receipt confirms your registration for <strong style="color:#D4AF37">Shikha Musical Production Mega Contest 2025</strong>.<br/>
          Please keep this receipt for your records. For queries, contact us on WhatsApp.
        </p>
      </div>

      <div class="rc-footer">
        <p>
          <strong>Shikha Musical Production</strong> &nbsp;|&nbsp;
          📞 +91 84001 89405 &nbsp;|&nbsp; Raebareli, Uttar Pradesh, India
        </p>
        <p style="margin-top:6px;">This is a computer-generated receipt and does not require a physical signature.</p>
      </div>
      <div class="watermark">SMP-OFFICIAL-RECEIPT · shikhamusicalprod.in</div>
    `;

    document.getElementById('previewArea').style.display = 'block';
    document.getElementById('previewArea').scrollIntoView({ behavior: 'smooth' });
  }

  async function downloadPDF(){
    const { jsPDF } = window.jspdf;
    const canvas = document.getElementById('receiptCanvas');

    // Use html2canvas-style capture via jsPDF html method
    const name = document.getElementById('r_name').value.trim() || 'receipt';
    const rno = document.getElementById('r_receiptno').value.trim();

    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a5' });

    doc.html(canvas, {
      callback: function(d){
        d.save('SMP-Receipt-' + name.replace(/\s+/g,'-') + '.pdf');
      },
      x: 5, y: 5,
      width: 138,
      windowWidth: 600,
      html2canvas: { scale: 0.5 }
    });
  }
</script>
</body>
</html>
